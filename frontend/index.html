<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AeroNetB ASCM — Login</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #0f1b2d 0%, #1a2e4a 50%, #0f1b2d 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .login-container {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 48px 40px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 25px 50px rgba(0,0,0,0.5);
  }
  .logo { text-align: center; margin-bottom: 32px; }
  .logo-icon {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
    border-radius: 16px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 28px; margin-bottom: 16px;
  }
  .logo h1 { color: #fff; font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  .logo p  { color: #94a3b8; font-size: 13px; margin-top: 4px; }
  .form-group { margin-bottom: 20px; }
  label { display: block; color: #94a3b8; font-size: 12px; font-weight: 600;
          text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  input {
    width: 100%; padding: 12px 16px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px; color: #fff; font-size: 14px;
    outline: none; transition: border-color 0.2s;
  }
  input:focus { border-color: #2563eb; background: rgba(37,99,235,0.1); }
  input::placeholder { color: #475569; }
  .btn-login {
    width: 100%; padding: 13px;
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
    color: #fff; border: none; border-radius: 10px;
    font-size: 15px; font-weight: 600; cursor: pointer;
    transition: transform 0.1s, box-shadow 0.2s;
    margin-top: 8px;
  }
  .btn-login:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(37,99,235,0.4); }
  .btn-login:active { transform: translateY(0); }
  .error-msg {
    background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3);
    color: #fca5a5; border-radius: 8px; padding: 10px 14px;
    font-size: 13px; margin-bottom: 16px; display: none;
  }
  .demo-hint {
    margin-top: 24px; padding-top: 20px;
    border-top: 1px solid rgba(255,255,255,0.08);
  }
  .demo-hint p { color: #64748b; font-size: 12px; text-align: center; margin-bottom: 12px; }
  .demo-roles { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
  .demo-role {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
    color: #94a3b8; font-size: 11px; padding: 4px 10px; border-radius: 20px;
    cursor: pointer; transition: all 0.15s;
  }
  .demo-role:hover { background: rgba(37,99,235,0.2); border-color: #2563eb; color: #93c5fd; }
  .loading { display: none; text-align: center; color: #94a3b8; font-size: 13px; margin-top: 12px; }
</style>
</head>
<body>
<div class="login-container">
  <div class="logo">
    <div class="logo-icon">✈</div>
    <h1>AeroNetB ASCM</h1>
    <p>Aerospace Supply Chain Management System</p>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <div class="form-group">
    <label>Email Address</label>
    <input type="email" id="email" placeholder="you@aeronetb.com" autocomplete="email">
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  </div>

  <button class="btn-login" id="loginBtn" onclick="handleLogin()">Sign In</button>
  <div class="loading" id="loading">Authenticating…</div>

  <div class="demo-hint">
    <p>Demo accounts (password: <strong style="color:#94a3b8">password</strong>)</p>
    <div class="demo-roles">
      <span class="demo-role" onclick="fillDemo('sarah.mitchell@aeronetb.com')">Procurement</span>
      <span class="demo-role" onclick="fillDemo('elena.petrov@aeronetb.com')">QC Inspector</span>
      <span class="demo-role" onclick="fillDemo('fatima.rashid@aeronetb.com')">SCM</span>
      <span class="demo-role" onclick="fillDemo('tom.brennan@aeronetb.com')">Engineer</span>
      <span class="demo-role" onclick="fillDemo('ingrid.svensson@aeronetb.com')">Auditor</span>
    </div>
  </div>
</div>

<script>
  const API = 'https://aeronetb-api-aici.onrender.com/api';

  function fillDemo(email) {
    document.getElementById('email').value = email;
    document.getElementById('password').value = 'password';
  }

  async function handleLogin() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errorEl  = document.getElementById('errorMsg');
    const loading  = document.getElementById('loading');
    const btn      = document.getElementById('loginBtn');

    errorEl.style.display = 'none';
    if (!email || !password) {
      errorEl.textContent = 'Please enter your email and password.';
      errorEl.style.display = 'block';
      return;
    }

    btn.disabled = true; loading.style.display = 'block';

    try {
      const res  = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();

      if (!res.ok) throw new Error(data.error || 'Login failed.');

      localStorage.setItem('token', data.token);
      localStorage.setItem('user',  JSON.stringify(data.user));
      window.location.href = 'dashboard.html';
    } catch (err) {
      errorEl.textContent = err.message;
      errorEl.style.display = 'block';
    } finally {
      btn.disabled = false; loading.style.display = 'none';
    }
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });

  // Redirect if already logged in
  if (localStorage.getItem('token')) window.location.href = 'dashboard.html';
</script>
</body>
</html>
